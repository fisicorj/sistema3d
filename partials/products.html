<div class="app-page-header page-header-hero d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
  <div>
    <span class="text-uppercase text-primary fw-semibold small d-block mb-1">Catálogo</span>
    <h1 class="h3 mb-1"><i class="bi bi-tags me-2"></i>Produtos</h1>
    <p class="text-body-secondary mb-0">Gerencie produtos, preços, custos e estoque.</p>
  </div>
  <div class="d-flex flex-wrap gap-2">
    <button class="btn btn-outline-secondary" onclick="saveCalculationAsProduct()"><i class="bi bi-calculator me-1"></i>Usar cálculo atual</button>
    <button class="btn btn-primary" onclick="showProductModal()"><i class="bi bi-plus-lg me-1"></i>Novo produto</button>
  </div>
</div>

<div class="row g-3 mb-4">
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-products-kpi"><div class="card-body"><small class="text-body-secondary">Produtos ativos</small><strong id="productsActiveCount">0</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-products-kpi"><div class="card-body"><small class="text-body-secondary">Estoque baixo</small><strong id="productsLowStockCount">0</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-products-kpi"><div class="card-body"><small class="text-body-secondary">Itens em estoque</small><strong id="productsStockTotal">0</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-products-kpi"><div class="card-body"><small class="text-body-secondary">Valor potencial</small><strong id="productsPotentialValue">R$ 0,00</strong></div></div></div>
</div>

<div class="card shadow-sm">
  <div class="card-header bg-body d-flex flex-wrap justify-content-between align-items-end gap-3">
    <div><h2 class="h5 mb-1">Catálogo de produtos</h2><p class="text-body-secondary small mb-0">Pesquise, edite e transforme produtos em pedidos.</p></div>
    <div class="d-flex flex-wrap gap-2 align-items-end">
      <div class="input-group s3d-product-search"><span class="input-group-text"><i class="bi bi-search"></i></span><input class="form-control" id="productSearch" oninput="loadProducts()" placeholder="Produto, SKU ou categoria" type="search"></div>
      <button class="btn btn-outline-primary" onclick="exportProductsToCSV()"><i class="bi bi-download me-1"></i>Exportar CSV</button>
    </div>
  </div>
  <div class="card-body"><div id="productsList"></div></div>
</div>
