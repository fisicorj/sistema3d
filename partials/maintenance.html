<div class="s3d-maintenance-page">
  <div class="app-page-header d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
    <div>
      <div class="d-flex align-items-center gap-3 mb-2">
        <span class="s3d-page-icon bg-warning-subtle text-warning-emphasis"><i class="bi bi-wrench-adjustable-circle"></i></span>
        <div>
          <h1 class="h3 mb-1">Manutenção</h1>
          <p class="text-body-secondary mb-0">Controle peças e consumíveis que compõem o custo operacional das impressoras.</p>
        </div>
      </div>
    </div>
    <button class="btn btn-primary d-inline-flex align-items-center gap-2" type="button" onclick="showMaintenanceModal()">
      <i class="bi bi-plus-lg"></i><span>Novo item</span>
    </button>
  </div>

  <div id="maintenanceSummary" class="mb-4"></div>

  <section class="card border shadow-sm overflow-hidden">
    <div class="card-header bg-body d-flex flex-wrap justify-content-between align-items-center gap-2 py-3">
      <div>
        <h2 class="h5 mb-1">Itens cadastrados</h2>
        <p class="text-body-secondary small mb-0">Ative apenas os itens que devem compor o custo por hora.</p>
      </div>
      <span class="badge text-bg-light border" id="maintenanceTableCount">0 itens</span>
    </div>
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th scope="col">Item</th>
            <th scope="col" class="text-end">Custo</th>
            <th scope="col" class="text-end">Vida útil</th>
            <th scope="col" class="text-end">Custo/hora</th>
            <th scope="col" class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody id="maintenanceTableBody">
          <tr><td colspan="5" class="text-center text-body-secondary py-5"><span class="spinner-border spinner-border-sm me-2"></span>Carregando itens...</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</div>
