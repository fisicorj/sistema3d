<div class="page-header">
  <div><span class="eyebrow">Vendas em parceiros</span><h1>Consignações</h1><p>Controle peças deixadas em lojas, comissões, vendas, devoluções e vencimentos.</p></div>
  <div class="d-flex gap-2 flex-wrap">
    <button class="btn btn-outline-primary" onclick="openConsignmentLocationModal()"><i class="bi bi-shop"></i> Novo local</button>
    <button class="btn btn-primary" onclick="openConsignmentModal()"><i class="bi bi-box-arrow-right"></i> Nova consignação</button>
  </div>
</div>
<div class="panel-body">
  <div class="row g-3 mb-4">
    <div class="col-6 col-xl-3"><div class="kpi-card h-100"><span class="kpi-icon"><i class="bi bi-box-seam"></i></span><div><small>Consignações ativas</small><strong id="consActive">0</strong><em>Em parceiros</em></div></div></div>
    <div class="col-6 col-xl-3"><div class="kpi-card h-100"><span class="kpi-icon text-danger"><i class="bi bi-clock-history"></i></span><div><small>Vencidas</small><strong id="consOverdue">0</strong><em>Precisam de acerto</em></div></div></div>
    <div class="col-6 col-xl-3"><div class="kpi-card h-100"><span class="kpi-icon"><i class="bi bi-cash-stack"></i></span><div><small>Estoque consignado</small><strong id="consStockValue">R$ 0</strong><em>Valor de venda</em></div></div></div>
    <div class="col-6 col-xl-3"><div class="kpi-card h-100"><span class="kpi-icon text-success"><i class="bi bi-wallet2"></i></span><div><small>Seu valor recebido</small><strong id="consOwnerAmount">R$ 0</strong><em>Após comissão</em></div></div></div>
  </div>
  <div class="modern-card mb-4">
    <div class="section-title"><div><strong>Filtros</strong><small>Localize consignações por situação</small></div></div>
    <div class="row g-2">
      <div class="col-md-5"><input id="consSearch" class="form-control" placeholder="Buscar local, cliente, pedido ou peça" oninput="renderConsignments()"></div>
      <div class="col-md-3"><select id="consStatusFilter" class="form-select" onchange="renderConsignments()"><option value="">Todos os status</option><option value="active">Ativa</option><option value="closed">Finalizada</option><option value="cancelled">Cancelada</option></select></div>
      <div class="col-md-4 text-md-end"><button class="btn btn-outline-secondary" onclick="loadConsignments()"><i class="bi bi-arrow-clockwise"></i> Atualizar</button></div>
    </div>
  </div>
  <div id="consignmentsList" class="row g-3"></div>
</div>
