<div class="app-page-header page-header-hero d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
  <div>
    <span class="text-uppercase text-primary fw-semibold small d-block mb-1">Operação</span>
    <h1 class="h3 mb-1"><i class="bi bi-box-seam me-2"></i>Pedidos</h1>
    <p class="text-body-secondary mb-0">Acompanhe o ciclo completo, do orçamento à entrega.</p>
  </div>
  <div class="d-flex flex-wrap gap-2">
    <button class="btn btn-outline-secondary" onclick="switchTab('calculator', event)"><i class="bi bi-calculator me-1"></i>Novo orçamento</button>
    <button class="btn btn-primary" onclick="exportOrdersToCSV()"><i class="bi bi-download me-1"></i>Exportar CSV</button>
  </div>
</div>

<div class="row g-3 mb-4" id="ordersSummary">
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-orders-kpi"><div class="card-body"><small class="text-body-secondary">Em aberto</small><strong id="ordersOpenCount">0</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-orders-kpi"><div class="card-body"><small class="text-body-secondary">Em produção</small><strong id="ordersPrintingCount">0</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-orders-kpi"><div class="card-body"><small class="text-body-secondary">A receber</small><strong id="ordersReceivableValue">R$ 0,00</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-orders-kpi"><div class="card-body"><small class="text-body-secondary">Entregues</small><strong id="ordersDeliveredCount">0</strong></div></div></div>
</div>

<div class="card shadow-sm mb-4 d-none" id="printQueuePanel">
  <div class="card-header bg-body d-flex align-items-center justify-content-between gap-2">
    <div><h2 class="h6 mb-1"><i class="bi bi-printer me-2"></i>Fila de impressão</h2><small class="text-body-secondary">Trabalhos aguardando ou em produção</small></div>
  </div>
  <div class="card-body" id="printQueueContent"></div>
</div>

<div class="card shadow-sm">
  <div class="card-header bg-body d-flex flex-wrap justify-content-between align-items-end gap-3">
    <div>
      <h2 class="h5 mb-1">Lista de pedidos</h2>
      <p class="text-body-secondary small mb-0">Filtre por etapa e gerencie cada pedido.</p>
    </div>
    <div class="d-flex flex-wrap gap-2 align-items-end">
      <div>
        <label class="form-label small mb-1" for="orderStatusFilter">Status</label>
        <select class="form-select" id="orderStatusFilter" onchange="loadOrders(true)">
          <option value="all">Todos os status</option><option value="quote">Orçamento</option><option value="approved">Aprovado</option><option value="paid">Pago</option><option value="printing">Em impressão</option><option value="post">Pós-processamento</option><option value="packaging">Embalagem</option><option value="shipped">Enviado</option><option value="delivered">Entregue</option><option value="cancelled">Cancelado</option><option value="deleted">Lixeira</option>
        </select>
      </div>
      <button class="btn btn-outline-primary" onclick="importOrdersFromCSV()"><i class="bi bi-upload me-1"></i>Importar CSV</button>
    </div>
  </div>
  <div class="card-body"><div id="ordersList"></div></div>
</div>
