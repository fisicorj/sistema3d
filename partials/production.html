<div class="app-page-header page-header-hero d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
  <div><span class="text-uppercase text-primary fw-semibold small d-block mb-1">Operação em tempo real</span><h1 class="h3 mb-1"><i class="bi bi-kanban me-2"></i>Produção</h1><p class="text-body-secondary mb-0">Visualize a fila e avance os trabalhos até a entrega.</p></div>
  <div class="d-flex flex-wrap gap-2"><button class="btn btn-outline-secondary" onclick="loadProductionBoard()"><i class="bi bi-arrow-clockwise me-1"></i>Atualizar</button><button class="btn btn-primary" onclick="switchTab('calculator', event)"><i class="bi bi-plus-lg me-1"></i>Novo trabalho</button></div>
</div>
<div class="row g-3 mb-4">
  <div class="col-6 col-xl-3"><div class="card h-100 shadow-sm s3d-production-kpi"><div class="card-body"><span class="s3d-kpi-icon bg-primary-subtle text-primary"><i class="bi bi-hourglass-split"></i></span><div><small>Aguardando</small><strong id="prodWaiting">0</strong><span>Pedidos na fila</span></div></div></div></div>
  <div class="col-6 col-xl-3"><div class="card h-100 shadow-sm s3d-production-kpi"><div class="card-body"><span class="s3d-kpi-icon bg-warning-subtle text-warning-emphasis"><i class="bi bi-printer"></i></span><div><small>Imprimindo</small><strong id="prodPrinting">0</strong><span>Em andamento</span></div></div></div></div>
  <div class="col-6 col-xl-3"><div class="card h-100 shadow-sm s3d-production-kpi"><div class="card-body"><span class="s3d-kpi-icon bg-info-subtle text-info-emphasis"><i class="bi bi-tools"></i></span><div><small>Pós-processo</small><strong id="prodPost">0</strong><span>Acabamento</span></div></div></div></div>
  <div class="col-6 col-xl-3"><div class="card h-100 shadow-sm s3d-production-kpi"><div class="card-body"><span class="s3d-kpi-icon bg-success-subtle text-success"><i class="bi bi-check2-circle"></i></span><div><small>Prontos</small><strong id="prodReady">0</strong><span>Para envio</span></div></div></div></div>
</div>
<div class="card shadow-sm overflow-hidden">
  <div class="card-header bg-body d-flex justify-content-between align-items-center gap-2"><div><h2 class="h5 mb-1">Fluxo de produção</h2><p class="text-body-secondary small mb-0">Role horizontalmente para acompanhar todas as etapas.</p></div><span class="badge text-bg-light border">Kanban</span></div>
  <div class="card-body p-0"><div class="kanban-board d-flex gap-3 overflow-x-auto p-3 align-items-stretch" id="productionKanban"></div></div>
</div>
