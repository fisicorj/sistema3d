<div class="app-page-header page-header-hero d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
  <div><span class="text-uppercase text-primary fw-semibold small d-block mb-1">Comercial</span><h1 class="h3 mb-1"><i class="bi bi-file-earmark-text me-2"></i>Orçamentos</h1><p class="text-body-secondary mb-0">Acompanhe propostas enviadas e converta aprovações em pedidos.</p></div>
  <div class="d-flex flex-wrap gap-2"><button class="btn btn-outline-secondary" onclick="switchTab('calculator', event)"><i class="bi bi-calculator me-1"></i>Novo orçamento</button><button class="btn btn-primary" onclick="loadQuotes(1)"><i class="bi bi-arrow-clockwise me-1"></i>Atualizar</button></div>
</div>
<div class="row g-3 mb-4">
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-quotes-kpi"><div class="card-body"><small class="text-body-secondary">Aguardando</small><strong id="quotesWaitingCount">0</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-quotes-kpi"><div class="card-body"><small class="text-body-secondary">Aceitos</small><strong id="quotesAcceptedCount">0</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-quotes-kpi"><div class="card-body"><small class="text-body-secondary">Valor em aberto</small><strong id="quotesOpenValue">R$ 0,00</strong></div></div></div>
  <div class="col-6 col-lg-3"><div class="card h-100 shadow-sm s3d-quotes-kpi"><div class="card-body"><small class="text-body-secondary">Conversão</small><strong id="quotesConversionRate">0%</strong></div></div></div>
</div>
<div class="card shadow-sm overflow-hidden">
  <div class="card-header bg-body"><h2 class="h5 mb-1">Histórico de orçamentos</h2><p class="text-body-secondary small mb-0">Visualize status, validade e ações disponíveis.</p></div>
  <div class="table-responsive"><table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th>#</th><th>Cliente / Item</th><th>Qtd</th><th class="text-end">Total</th><th>Status</th><th>Data / Validade</th><th class="text-end">Ações</th></tr></thead><tbody id="quotesTableBody"><tr><td class="text-body-secondary text-center py-5" colspan="7"><div class="spinner-border spinner-border-sm me-2" role="status"></div>Carregando...</td></tr></tbody></table></div>
  <div class="card-footer bg-body" id="quotesPagination"></div>
</div>
